apiVersion: "kubeflow.org/v1"
kind: PyTorchJob
metadata:
  name: llama3-2-1b-fsdp-nsight
spec:
  elasticPolicy:
    rdzvBackend: c10d
    minReplicas: 1
    maxReplicas: 64
    maxRestarts: 0  # No restarts for profiling jobs
  pytorchReplicaSpecs:
    Worker:
      replicas: $NUM_NODES
      restartPolicy: Never
      template:
        metadata:
          labels:
            app: llama3-2-1b-fsdp-nsight
        spec:
          volumes:
            - name: shmem
              hostPath:
                path: /dev/shm
            - name: local
              hostPath:
                path: /mnt/k8s-disks/0
            - name: nsight
              hostPath:
                path: /opt/nvidia/nsight-systems
                type: Directory
            - name: scripts
              configMap:
                name: nsight-scripts
                defaultMode: 0755
          #nodeSelector:
          #  node.kubernetes.io/instance-type: "${INSTANCE_TYPE}"
          #  sagemaker.amazonaws.com/compute-type: hyperpod  # For HyperPod EKS
          containers:
            - name: pytorch
              image: ${IMAGE_URI}
              imagePullPolicy: Always
              resources:
                requests:
                  nvidia.com/gpu: $GPU_PER_NODE
                  vpc.amazonaws.com/efa: $EFA_PER_NODE
                limits:
                  nvidia.com/gpu: $GPU_PER_NODE
                  vpc.amazonaws.com/efa: $EFA_PER_NODE
              env:
              # --- NCCL ---
              - name: NCCL_DEBUG
                value: "INFO"
              - name: NCCL_SOCKET_IFNAME
                value: "^lo"
              - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
                value: "1"
              - name: TORCH_NCCL_ENABLE_MONITORING
                value: "1"
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: "expandable_segments:True"
              # --- EFA (uncomment for P4/P5 with EFA + OFI-NCCL) ---
              #- name: FI_PROVIDER
              #  value: efa
              #- name: FI_EFA_USE_DEVICE_RDMA
              #  value: "1"
              #- name: FI_EFA_FORK_SAFE
              #  value: "1"
              #- name: NCCL_NET
              #  value: ofi
              #- name: LD_LIBRARY_PATH
              #  value: "/opt/amazon/ofi-nccl/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
              # --- Nsight Profiler Config ---
              # See nsys-profile.sh for full documentation of these variables.
              - name: NSYS_DELAY
                value: "30"
              - name: NSYS_DURATION
                value: "120"
              - name: NSYS_OUTPUT_DIR
                value: "/local/nsight-reports"
              - name: NSYS_RANKS_TO_PROFILE
                value: "0"
              - name: NSYS_PYTORCH_MODE
                value: "autograd-shapes-nvtx"
              - name: NSYS_PYTHON_SAMPLE
                value: "true"
              # GPU metrics: set to "all" for A100/H100/H200. "none" for g5 (A10G).
              - name: NSYS_GPU_METRICS
                value: "none"
              - name: NSYS_CUDA_MEMORY
                value: "true"
              - name: NSYS_SAMPLE
                value: "none"
              - name: NSYS_TRACE
                value: "cuda,nvtx,osrt"
              # --- HuggingFace (optional, for gated models/tokenizers) ---
              #- name: HF_TOKEN
              #  value: "${HF_TOKEN}"
              command:
                - /bin/bash
                - /scripts/nsys-profile.sh
                - --
                # NOTE: torchrun path depends on container image.
                # Common paths: /usr/local/bin/torchrun, /opt/conda/bin/torchrun
                - /usr/local/bin/torchrun
                - --nproc_per_node=$GPU_PER_NODE
                - --nnodes=$NUM_NODES
                - /fsdp/train.py
                - --max_context_width=2048
                - --num_key_value_heads=2
                - --intermediate_size=8192
                - --hidden_width=2048
                - --num_layers=16
                - --num_heads=32
                - --model_type=llama_v3
                - --tokenizer=hf-internal-testing/llama-tokenizer
                - --checkpoint_freq=999
                - --validation_freq=999
                - --max_steps=50
                - --checkpoint_dir=/local/checkpoints
                - --dataset=allenai/c4
                - --dataset_config_name=en
                - --train_batch_size=2
                - --val_batch_size=1
                - --sharding_strategy=full
                - --offload_activations=1
                - --bf16=1
                - --lr=0.0001
                - --logging_freq=1
              volumeMounts:
                - name: shmem
                  mountPath: /dev/shm
                - name: local
                  mountPath: /local
                - name: nsight
                  mountPath: /nsight
                  readOnly: true
                - name: scripts
                  mountPath: /scripts
