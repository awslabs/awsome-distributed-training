apiVersion: v1
kind: Pod
metadata:
  name: inference-grpo
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: hyperpod-i-0e7147295872eff96
  containers:
    - name: inference
      image: ${REGISTRY}${IMAGE}:${TAG} 
      imagePullPolicy: Always
      resources:
        requests:
          nvidia.com/gpu: 4
          memory: "120Gi"
        limits:
          nvidia.com/gpu: 4
          memory: "120Gi"
      env:
        - name: HF_TOKEN
          value: $HF_TOKEN
        - name: HF_HOME
          value: "/fsx/hf_cache"
        - name: PYTORCH_CUDA_ALLOC_CONF
          value: "expandable_segments:True"
      command:
        - "/bin/bash"
        - "-c"
        - |
          echo "=== GRPO MODEL Inference Pod ==="
          nvidia-smi --query-gpu=name,memory.total --format=csv
          sleep infinity
      volumeMounts:
        - name: fsx-storage
          mountPath: /fsx
        - name: shmem
          mountPath: /dev/shm
  volumes:
    - name: fsx-storage
      persistentVolumeClaim:
        claimName: fsx-claim
    - name: shmem
      hostPath:
        path: /dev/shm
