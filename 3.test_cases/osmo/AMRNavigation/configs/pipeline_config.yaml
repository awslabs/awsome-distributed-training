# AMR Navigation Pipeline Configuration
# Override per-stage parameters here

pipeline:
  s3_bucket: "amr-pipeline-data"
  run_id: "run-001"
  namespace: "isaac-sim"

images:
  isaac_sim: "${ISAAC_SIM_IMAGE_URI}"
  cosmos_transfer: "${COSMOS_IMAGE_URI}"
  xmobility: "${XMOBILITY_IMAGE_URI}"

stage1_scene_setup:
  num_aisles: 4
  aisle_length: 20.0

stage2_occupancy_map:
  resolution: 0.1
  depth_threshold: 0.5

stage3_trajectory_gen:
  num_trajectories: 10
  num_frames: 100
  camera_height: 1.0

stage4_render:
  image_width: 640
  image_height: 480

stage5_augment:
  num_variants: 1

stage6_train_evaluate:
  epochs: 20
  batch_size: 16
  learning_rate: 0.0001
